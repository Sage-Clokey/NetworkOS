services:
  - type: web
    name: networkos-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: /data/networkos.db
    disk:
      name: networkos-db
      mountPath: /data
      sizeGB: 1
